<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>校長助理｜Principal Agent</title>
<style>
:root{--pri:#4f46e5;--pril:#e0e7ff;--prid:#3730a3;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;
--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g400:#9ca3af;--g600:#4b5563;--g700:#374151;--g900:#111827;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--g100);color:var(--g900);
min-height:100dvh;display:flex;flex-direction:column;max-width:720px;margin:0 auto}
header{position:sticky;top:0;z-index:10;background:var(--pri);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:18px;flex:1}
header .sub{font-size:11px;opacity:.85}
main{flex:1;overflow-y:auto;padding:14px;padding-bottom:76px}
.view{display:none}.view.active{display:block}
/* 首頁情境卡 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#fff;border-radius:14px;padding:14px 12px;cursor:pointer;border:1px solid var(--g200);transition:.15s}
.card:active{transform:scale(.97);background:var(--pril)}
.card .emo{font-size:26px}.card .t{font-weight:700;font-size:15px;margin:6px 0 2px}.card .d{font-size:11.5px;color:var(--g600);line-height:1.4}
.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12px;color:#92400e;margin-bottom:12px;line-height:1.5}
/* 表單 */
.fbox{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--g200)}
.fbox h2{font-size:17px;margin-bottom:12px}
label{display:block;font-size:13px;font-weight:600;color:var(--g700);margin:10px 0 4px}
input[type=text],textarea,select{width:100%;padding:10px;border:1px solid var(--g200);border-radius:10px;font-size:15px;font-family:inherit;background:var(--g50)}
textarea{min-height:84px;resize:vertical}
.btn{display:block;width:100%;margin-top:14px;padding:13px;border:none;border-radius:12px;background:var(--pri);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.btn:disabled{background:var(--g400)}
.btn2{background:#fff;color:var(--g700);border:1px solid var(--g200);font-weight:500}
/* 對話 */
.msg{max-width:88%;margin-bottom:10px;padding:11px 13px;border-radius:14px;font-size:15px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg.u{background:var(--pri);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg.a{background:#fff;border:1px solid var(--g200);border-bottom-left-radius:4px}
.msg.a .tools{margin-top:8px;display:flex;gap:8px}
.msg .tools button{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--g200);background:var(--g50);cursor:pointer;color:var(--g600)}
.msg.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:13px}
.typing{color:var(--g400);font-size:13px;padding:6px 2px}
.inputbar{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:#fff;border-top:1px solid var(--g200);padding:8px 10px;display:none;gap:8px;align-items:flex-end}
.inputbar.show{display:flex}
.inputbar textarea{flex:1;min-height:42px;max-height:120px;padding:9px}
.inputbar button{padding:10px 16px;border:none;border-radius:10px;background:var(--pri);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
/* 底部導覽 */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:#fff;border-top:1px solid var(--g200);display:flex;z-index:10}
nav button{flex:1;padding:9px 0 max(9px,env(safe-area-inset-bottom));border:none;background:none;font-size:11px;color:var(--g400);cursor:pointer}
nav button.on{color:var(--pri);font-weight:700}
nav button .i{display:block;font-size:20px}
/* 設定 */
.set{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--g200);margin-bottom:12px}
.set h3{font-size:15px;margin-bottom:8px}
.hint{font-size:12px;color:var(--g600);line-height:1.5;margin-top:4px}
.hint a{color:var(--pri)}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--g100);color:var(--g600);margin-left:6px}
.pill.ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header><span style="font-size:24px">🎓</span><h1>校長助理<div class="sub">你的 AI 幕僚長・疑難雜症一起想</div></h1></header>
<main>
  <!-- 首頁 -->
  <div id="v-home" class="view active">
    <div class="notice">⚠️ AI 產出僅供草擬與參考。涉及<b>法規、人事、採購、學生安全</b>之決定，請以現行法令、主管機關函釋與校內程序為準。個資請勿輸入全名，用「某生／某師」代稱。</div>
    <div class="grid" id="cards"></div>
  </div>
  <!-- 情境表單 -->
  <div id="v-form" class="view"><div class="fbox" id="formbox"></div></div>
  <!-- 對話 -->
  <div id="v-chat" class="view"><div id="msgs"></div></div>
  <!-- 設定 -->
  <div id="v-set" class="view">
    <div class="set"><h3>🤖 AI 金鑰（存在本機瀏覽器，不會上傳）</h3>
      <label>Google Gemini API Key <span id="gs" class="pill">未設定</span></label>
      <input type="text" id="gkey" placeholder="AIza..." autocomplete="off">
      <div class="hint">到 <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> 免費取得。建議優先設定這個。</div>
      <label>OpenAI API Key（備援，可不填）<span id="os" class="pill">未設定</span></label>
      <input type="text" id="okey" placeholder="sk-..." autocomplete="off">
      <label>Gemini 模型名</label><input type="text" id="gmodel">
      <label>OpenAI 模型名</label><input type="text" id="omodel">
      <div class="hint">預設值寫入時間 2026-07；若呼叫失敗顯示模型不存在，請改成你帳號當前可用的模型名。</div>
      <button class="btn" onclick="saveSet()">儲存設定</button>
    </div>
    <div class="set"><h3>🗂️ 資料</h3>
      <div class="hint">對話記錄只存在此裝置瀏覽器（localStorage）。清除瀏覽資料會一併消失，重要產出請自行複製保存。</div>
      <button class="btn btn2" onclick="clearHist()">清除全部對話記錄</button>
    </div>
  </div>
</main>
<div class="inputbar" id="bar">
  <textarea id="inp" placeholder="繼續追問或補充…" rows="1"></textarea>
  <button onclick="sendFree()">送出</button>
</div>
<nav>
  <button id="n-home" class="on" onclick="go('home')"><span class="i">🏠</span>情境</button>
  <button id="n-chat" onclick="go('chat')"><span class="i">💬</span>對話</button>
  <button id="n-set" onclick="go('set')"><span class="i">⚙️</span>設定</button>
</nav>
<script>
/* ───────── 情境定義 ───────── */
const SCN=[
 {id:'speech',emo:'🎤',t:'致詞稿',d:'開學、畢業、運動會、家長日…',f:[
   ['occ','text','場合（例：畢業典禮、模範生表揚）'],['aud','text','對象（例：六年級生＋家長）'],
   ['len','sel','長度',['1 分鐘','3 分鐘','5 分鐘','10 分鐘']],['pts','ta','想帶到的重點（人事物、故事、感謝名單…）']],
   p:(v)=>`請幫我寫一份校長致詞稿。場合：${v.occ}；對象：${v.aud}；長度約 ${v.len}。想帶到的重點：${v.pts||'由你建議'}。要求：口語自然、有畫面感、避免陳腔濫調，結尾有記憶點；先給講稿，再附 3 行「上台提示」。`},
 {id:'doc',emo:'📄',t:'公文與簽呈',d:'函稿、簽、公告、回覆上級',f:[
   ['typ','sel','類型',['簽（陳核）','函稿','校內公告','回覆教育局處來文']],['sub','text','事由（一句話）'],
   ['pts','ta','要點與背景（越具體越好）'],['tone','sel','語氣',['正式','正式但精簡','稍軟性（對家長）']]],
   p:(v)=>`請以台灣學校行政公文慣例，幫我草擬「${v.typ}」。事由：${v.sub}。要點與背景：${v.pts}。語氣：${v.tone}。要求：符合公文程式用語（主旨/說明/擬辦視類型），條列清楚；最後提醒我需自行確認的法規或程序（若有）。`},
 {id:'parent',emo:'👨‍👩‍👧',t:'家長溝通',d:'投訴回應、溝通信、面談稿',f:[
   ['sit','ta','情境描述（發生什麼事、家長的訴求）'],['ch','sel','形式',['LINE/簡訊回覆','正式信件','面談talking points','電話腳本']],
   ['goal','text','你希望達到的結果']],
   p:(v)=>`我是校長，需要處理家長溝通。情境：${v.sit}。希望達到：${v.goal}。請給我「${v.ch}」形式的內容。要求：同理但不失立場、不做無法兌現的承諾、留下後續處理路徑；若情境涉及通報義務（霸凌/兒少保護等），先明確提醒我。`},
 {id:'crisis',emo:'🚨',t:'校安與危機',d:'事件處置步驟、通報、對外說明',f:[
   ['sit','ta','事件描述（時間、涉及對象用代稱、目前狀況）'],['done','ta','已採取的措施']],
   p:(v)=>`校園事件需要處置建議。事件：${v.sit}。已採取：${v.done||'尚未'}。請依台灣校園安全實務給我：1) 依優先序的處置步驟清單 2) 可能涉及的通報義務與時限（標明「以現行規定為準，需查證」）3) 給家長與教職員的說明要點 4) 常見錯誤提醒。這是緊急參考，最終以校安通報規定與主管機關指示為準。`},
 {id:'staff',emo:'🧑‍🏫',t:'教師與人事',d:'考核評語、面談、衝突協調',f:[
   ['sit','ta','情境（教師表現、衝突、需求…用代稱）'],['need','sel','需要',['考核/推薦評語','一對一面談要點','衝突協調方案','輔導與支持建議']]],
   p:(v)=>`校內人事情境：${v.sit}。請給我「${v.need}」。要求：具體可執行、顧及士氣與程序正義；涉及考核或不適任處理程序時，提醒我相關法定程序需查證現行規定。`},
 {id:'meet',emo:'📋',t:'會議',d:'主持稿、議程、紀錄整理',f:[
   ['typ','text','會議類型（例：校務會議、導師會報）'],['need','sel','需要',['開場與主持稿','議程草案','會議紀錄整理（貼原稿）','困難議題的引導話術']],['pts','ta','議題內容或原始紀錄']],
   p:(v)=>`會議：${v.typ}。需要：${v.need}。內容：${v.pts}。要求：結構清楚可直接使用；若是紀錄整理，輸出為「決議事項/待辦（負責人+期限欄位）/追蹤事項」三段。`},
 {id:'plan',emo:'🏫',t:'計畫與文案',d:'計畫書、新聞稿、活動文案',f:[
   ['sub','text','主題（例：雙語計畫申請、校慶新聞稿）'],['aud','text','給誰看（教育局/家長/媒體/全校）'],['pts','ta','素材與重點']],
   p:(v)=>`請幫我產出「${v.sub}」，讀者是：${v.aud}。素材：${v.pts}。要求：先給架構、再給全文；量化成效處留【待填數字】，不要編造數據。`},
 {id:'free',emo:'💬',t:'自由諮詢',d:'任何校長疑難雜症，直接聊',f:[],p:null},
];
/* ───────── 狀態與儲存 ───────── */
const S={gkey:'',okey:'',gmodel:'gemini-2.5-flash',omodel:'gpt-4o-mini'};
try{Object.assign(S,JSON.parse(localStorage.getItem('pa_set')||'{}'));}catch(e){}
let hist=[];try{hist=JSON.parse(localStorage.getItem('pa_hist')||'[]');}catch(e){}
function saveHist(){localStorage.setItem('pa_hist',JSON.stringify(hist.slice(-60)));}
const SYS=`你是台灣中小學校長的資深幕僚長（主任祕書等級），熟悉台灣教育現場、教育部與縣市教育局處行政慣例、公文程式與校園法規框架。一律使用繁體中文（台灣用語）回覆。原則：1) 給可直接使用的成品，不要只給建議清單，除非使用者只要建議。2) 涉及法規、通報、人事、採購等有法律效果的內容，結尾標註「⚠️ 請以現行法規與主管機關函釋為準」並點名該查什麼。3) 不編造數據、名字與法條號；不確定就寫【待查證】。4) 語氣專業溫暖，符合教育工作者身分。`;
/* ───────── 畫面 ───────── */
const $=id=>document.getElementById(id);
function go(v){['home','form','chat','set'].forEach(x=>{const el=$('v-'+x);if(el)el.classList.toggle('active',x===v);});
 ['home','chat','set'].forEach(x=>{const n=$('n-'+x);if(n)n.classList.toggle('on',x===v);});
 $('bar').classList.toggle('show',v==='chat');if(v==='chat')scrollBottom();if(v==='set')loadSet();}
function renderCards(){$('cards').innerHTML=SCN.map(s=>`<div class="card" onclick="openScn('${s.id}')"><div class="emo">${s.emo}</div><div class="t">${s.t}</div><div class="d">${s.d}</div></div>`).join('');}
function openScn(id){const s=SCN.find(x=>x.id===id);if(!s)return;
 if(id==='free'){go('chat');$('inp').focus();return;}
 $('formbox').innerHTML='<h2>'+s.emo+' '+s.t+'</h2>'+s.f.map(f=>{
  const[k,ty,lab,opt]=f;
  if(ty==='sel')return`<label>${lab}</label><select id="f-${k}">${opt.map(o=>`<option>${o}</option>`).join('')}</select>`;
  if(ty==='ta')return`<label>${lab}</label><textarea id="f-${k}"></textarea>`;
  return`<label>${lab}</label><input type="text" id="f-${k}">`;
 }).join('')+`<button class="btn" onclick="submitScn('${id}')">✨ 產生</button><button class="btn btn2" onclick="go('home')">返回</button>`;
 go('form');}
function submitScn(id){const s=SCN.find(x=>x.id===id);const v={};let miss=false;
 s.f.forEach(f=>{const el=$('f-'+f[0]);v[f[0]]=(el.value||'').trim();if(f[1]!=='ta'&&!v[f[0]])miss=true;});
 if(miss){alert('必填欄位還沒填喔');return;}
 send(s.p(v));}
/* ───────── 對話 ───────── */
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function renderMsgs(){$('msgs').innerHTML=hist.map((m,i)=>{
 if(m.role==='user')return`<div class="msg u">${esc(m.content)}</div>`;
 return`<div class="msg a">${esc(m.content)}<div class="tools"><button onclick="copyMsg(${i})">📋 複製</button></div></div>`;
}).join('');scrollBottom();}
function copyMsg(i){navigator.clipboard.writeText(hist[i].content).then(()=>alert('已複製'));}
function scrollBottom(){setTimeout(()=>{document.querySelector('main').scrollTop=999999;},50);}
function sendFree(){const t=$('inp').value.trim();if(!t)return;$('inp').value='';send(t);}
async function send(text){
 if(!S.gkey&&!S.okey){go('set');alert('請先在設定填入至少一組 API Key（建議 Gemini，免費）');return;}
 hist.push({role:'user',content:text});saveHist();go('chat');renderMsgs();
 const tip=document.createElement('div');tip.className='typing';tip.textContent='思考中…';$('msgs').appendChild(tip);scrollBottom();
 try{const out=await aiCall();hist.push({role:'assistant',content:out});}
 catch(e){hist.push({role:'assistant',content:'❌ 呼叫失敗：'+e.message+'\n請到「設定」檢查 API Key 與模型名，或稍後再試。'});}
 saveHist();renderMsgs();}
/* ───────── AI 多供應商 ───────── */
function ctx(){return hist.slice(-12);}
async function callGemini(){
 const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(S.gmodel)}:generateContent?key=${encodeURIComponent(S.gkey)}`;
 const body={system_instruction:{parts:[{text:SYS}]},contents:ctx().map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]})),generationConfig:{temperature:0.7,maxOutputTokens:4096}};
 const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
 if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error('Gemini '+r.status+' '+(j.error?.message||''));}
 const j=await r.json();const t=j.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'';
 if(!t)throw new Error('Gemini 回應為空');return t;}
async function callOpenAI(){
 const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',
  headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.okey},
  body:JSON.stringify({model:S.omodel,messages:[{role:'system',content:SYS},...ctx()],temperature:0.7,max_tokens:4096})});
 if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error('OpenAI '+r.status+' '+(j.error?.message||''));}
 const j=await r.json();const t=j.choices?.[0]?.message?.content||'';
 if(!t)throw new Error('OpenAI 回應為空');return t;}
async function aiCall(){
 const pvs=[];if(S.gkey)pvs.push(callGemini);if(S.okey)pvs.push(callOpenAI);
 let last;for(const p of pvs){try{return await p();}catch(e){last=e;}}
 throw last||new Error('未設定 API Key');}
/* ───────── 設定 ───────── */
function loadSet(){$('gkey').value=S.gkey;$('okey').value=S.okey;$('gmodel').value=S.gmodel;$('omodel').value=S.omodel;pill();}
function pill(){$('gs').textContent=S.gkey?'已設定':'未設定';$('gs').className='pill'+(S.gkey?' ok':'');
 $('os').textContent=S.okey?'已設定':'未設定';$('os').className='pill'+(S.okey?' ok':'');}
function saveSet(){S.gkey=$('gkey').value.trim();S.okey=$('okey').value.trim();
 S.gmodel=$('gmodel').value.trim()||'gemini-2.5-flash';S.omodel=$('omodel').value.trim()||'gpt-4o-mini';
 localStorage.setItem('pa_set',JSON.stringify(S));pill();alert('已儲存');go('home');}
function clearHist(){if(confirm('確定清除全部對話？此動作無法復原')){hist=[];saveHist();renderMsgs();}}
/* ───────── init ───────── */
renderCards();renderMsgs();
$('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();sendFree();}});
</script>
</body>
</html>
